[package]
name = "zecauth-testvectors"
version = "0.1.0"
edition = "2021"
description = "Generates cross-implementation test vectors for the ZecAuth React Native SDK"
license = "MIT"

[[bin]]
name = "zecauth-testvectors"
path = "src/main.rs"

[dependencies]
zecauth-core = { path = "../zecauth-core" }
zip32 = "0.2"
reddsa = "0.5"
rand = "0.8"
rand_chacha = "0.3"
pasta_curves = "0.5"
group = "0.13"
ff = "0.13"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"
