[package]
name = "zecauth-core"
version = "0.1.0"
edition = "2021"
description = "ZecAuth — wallet connection protocol for Zcash (core cryptography)"
license = "MIT"

[dependencies]
zip32 = "0.2"
reddsa = "0.5"
rand = "0.8"
rand_chacha = "0.3"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"
thiserror = "2"

[dev-dependencies]
rand = "0.8"
