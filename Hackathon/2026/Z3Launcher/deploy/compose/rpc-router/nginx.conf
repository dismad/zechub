# Minimal regtest rpc-router. Splits a single host port into the two
# upstream services by URL prefix:
#   /zebra/*    -> zebra:8232 (JSON-RPC)
#   /zcashd/*   -> zcashd:18231 (JSON-RPC, used by the regtest seeder)
#
# This is intentionally tiny — the control plane only ever calls
# /zebra/* (via the normal Zebra client pointing at the host port) and
# /zcashd/* (via internal/regtest.Seeder). A wallet pointed at Zaino
# keeps using the same Zaino gRPC port as on mainnet.

server {
    listen 80;

    location /zebra/ {
        proxy_pass http://zebra:8232/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /zcashd/ {
        proxy_pass http://zcashd:18231/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
