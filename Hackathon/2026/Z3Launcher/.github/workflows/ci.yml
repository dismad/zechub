# Z3 Launcher CI — build the SPA, test, vet, and cross-compile release
# binaries (linux/darwin/windows × amd64/arm64) with the SPA embedded.
#
# Two jobs:
#   - ci:    runs on every push and PR (lint, test, sanity build)
#   - release: on tag push (vX.Y.Z), builds all 6 target binaries and
#              uploads them to a GitHub release via softprops/action-gh-release.
#
# The release job uses a matrix of GOOS/GOARCH to cross-compile from a
# single ubuntu runner. CGO is disabled (the binary is pure Go and we ship
# a static binary), so no cross compilers are needed beyond what `go` ships.
name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write   # needed by the release job to create/update the GH release

jobs:
  ci:
    name: lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build SPA
        working-directory: web
        run: npm ci && npm run build

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 ./...

      # Sanity build — proves the embed pipeline works end-to-end. The
      # release job below reuses the same flags across the full matrix.
      - name: Build (linux/amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" -o bin/z3launcher ./cmd/z3launcher

      - name: Upload sanity binary
        uses: actions/upload-artifact@v4
        with:
          name: z3launcher-linux-amd64
          path: bin/z3launcher
          if-no-files-found: error
          retention-days: 7

  release:
    name: release ${{ matrix.target }}
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, target: linux-amd64 }
          - { goos: linux,   goarch: arm64, target: linux-arm64 }
          - { goos: darwin,  goarch: amd64, target: darwin-amd64 }
          - { goos: darwin,  goarch: arm64, target: darwin-arm64 }
          - { goos: windows, goarch: amd64, target: windows-amd64 }
          - { goos: windows, goarch: arm64, target: windows-arm64 }
    runs-on: ubuntu-latest
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build SPA (embed target)
        working-directory: web
        run: npm ci && npm run build

      - name: Build binary
        # CGO disabled → statically linked, runs anywhere the matching
        # libc is available (linux/macos/windows have their own syscalls).
        # -trimpath strips absolute paths from the binary; -s -w strips
        # the symbol table and DWARF info to shrink the artifact.
        run: |
          mkdir -p dist-release
          CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" \
            -o dist-release/z3launcher-${{ matrix.target }}${{ matrix.goos == 'windows' && '.exe' || '' }} \
            ./cmd/z3launcher

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: z3launcher-${{ matrix.target }}
          path: dist-release/
          if-no-files-found: error
          retention-days: 14

      - name: Publish to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # Bind the artifact matrix rows to the release by glob — softprops
          # expands ${{ matrix.target }} in `files` so each matrix row only
          # uploads its own binary.
          files: dist-release/z3launcher-${{ matrix.target }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
