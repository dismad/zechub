app = "turnstile-scanner"
primary_region = "ams"

[build]
  dockerfile = "scanner/Dockerfile"

[env]
  PORT = "8080"
  LIGHTWALLETD_URL = "https://zec.rocks:443"
  NTFY_BASE_URL = "https://ntfy.sh"
  RUST_LOG = "turnstile_scanner=info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
