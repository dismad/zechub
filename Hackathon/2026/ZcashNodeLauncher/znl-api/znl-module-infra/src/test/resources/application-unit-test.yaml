spring:
  main:
    lazy-initialization: true # 
    banner-mode: off # 

--- ####################  ####################

spring:
  # 
  datasource:
    name: ZcashNodeLauncher
    url: jdbc:h2:mem:testdb;MODE=MYSQL;DATABASE_TO_UPPER=false;NON_KEYWORDS=value; # 
    driver-class-name: org.h2.Driver
    username: sa
    password:
    druid:
      async-init: true # 
      initial-size: 1 # 
  sql:
    init:
      schema-locations: classpath:/sql/create_tables.sql
      encoding: UTF-8

  # 
  redis:
    host: 127.0.0.1 # 
    port: 16379 # 
    database: 0 # 

mybatis-plus:
  lazy-initialization: true # 
  type-aliases-package: ${znl.info.base-package}.module.*.dal.dataobject






# 
znl:
  info:
    base-package: com.zcashjava.znl
